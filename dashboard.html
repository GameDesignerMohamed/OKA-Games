<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OKA-Games — Forge Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      padding: 32px 24px;
      max-width: 860px;
      margin: 0 auto;
    }
    header {
      border-bottom: 1px solid #2a2a3a;
      padding-bottom: 16px;
      margin-bottom: 28px;
    }
    header h1 { font-size: 20px; color: #ff6b35; letter-spacing: 2px; }
    header p { color: #555; font-size: 12px; margin-top: 5px; }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-box {
      background: #111118;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 12px 20px;
    }
    .stat-box .label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
    .stat-box .value { font-size: 24px; font-weight: bold; margin-top: 2px; }

    .feed-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; }

    .build-card {
      background: #111118;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }
    .card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .project-name a {
      color: #ff6b35;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
    }
    .project-name a:hover { text-decoration: underline; }
    .date { color: #444; font-size: 11px; }
    .badge {
      margin-left: auto;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .badge.working { background: #1a3a1a; color: #4caf50; border: 1px solid #2d5a2d; }
    .badge.partial  { background: #3a2e1a; color: #ff9800; border: 1px solid #5a4a2d; }
    .badge.failed   { background: #3a1a1a; color: #f44336; border: 1px solid #5a2d2d; }

    .idea { color: #888; font-size: 12px; margin-bottom: 6px; }
    .takeaway { color: #bbb; font-size: 12px; font-style: italic; }
    .tags { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 10px;
      color: #555;
      background: #16161e;
      border: 1px solid #2a2a3a;
      border-radius: 3px;
      padding: 1px 7px;
    }

    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: #333;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>🔨 OKA-GAMES FORGE DASHBOARD</h1>
  <p>One game per night — shipped ugly, learned fast</p>
</header>

<div class="stats">
  <div class="stat-box">
    <div class="label">Total</div>
    <div class="value" id="total" style="color:#ff6b35">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Working</div>
    <div class="value" id="working" style="color:#4caf50">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Partial</div>
    <div class="value" id="partial" style="color:#ff9800">0</div>
  </div>
  <div class="stat-box">
    <div class="label">Failed</div>
    <div class="value" id="failed" style="color:#f44336">0</div>
  </div>
</div>

<div class="feed-title">Build Feed</div>

<div id="feed">
  <!-- BUILD ENTRIES GO HERE — newest first -->
  <div class="empty-state">
    <div class="icon">🎮</div>
    <p>First game ships tonight.</p>
  </div>
</div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const cards = document.querySelectorAll('.build-card');
    let w=0, p=0, f=0;
    cards.forEach(c => {
      if (c.querySelector('.badge.working')) w++;
      else if (c.querySelector('.badge.partial')) p++;
      else if (c.querySelector('.badge.failed')) f++;
    });
    document.getElementById('total').textContent = w+p+f;
    document.getElementById('working').textContent = w;
    document.getElementById('partial').textContent = p;
    document.getElementById('failed').textContent = f;
  });
</script>

</body>
</html>
