<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arena Blitz</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #e0e0e0;
      overflow: hidden;
    }
    #gameCanvas {
      border: 2px solid #333;
      cursor: crosshair;
      display: block;
    }
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #888;
      pointer-events: none;
    }
    #ui span { color: #ff6b35; font-weight: bold; }
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      text-align: center;
    }
    #overlay h1 { font-size: 42px; letter-spacing: 6px; margin-bottom: 12px; }
    #overlay .sub { font-size: 14px; color: #888; margin-bottom: 8px; }
    #overlay .score-display { font-size: 20px; color: #ff6b35; margin: 16px 0 24px; }
    #overlay button {
      background: #ff6b35;
      border: none;
      color: #000;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      padding: 10px 32px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    #overlay button:hover { background: #ff8c5a; }
    #overlay .controls {
      margin-top: 24px;
      color: #555;
      font-size: 11px;
      line-height: 1.8;
    }
    #hitFlash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,0,0,0);
      pointer-events: none;
      transition: background 0.05s;
    }
    .wave-announce {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 48px;
      font-weight: bold;
      color: #ff6b35;
      letter-spacing: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div>WAVE <span id="uiWave">1</span>/10</div>
  <div>SCORE <span id="uiScore">0</span></div>
  <div>LIVES <span id="uiLives">❤❤❤</span></div>
</div>

<div id="hitFlash"></div>

<div class="wave-announce" id="waveAnnounce"></div>

<div id="overlay">
  <h1 id="overlayTitle" style="color:#ff6b35">ARENA BLITZ</h1>
  <div class="sub" id="overlaySub">Rogue agent. Digital arena. Ten waves.</div>
  <div class="score-display" id="overlayScore"></div>
  <button id="overlayBtn">▶ ENTER ARENA</button>
  <div class="controls">
    WASD — MOVE &nbsp;|&nbsp; MOUSE — AIM &nbsp;|&nbsp; CLICK / SPACE — SHOOT<br>
    3 HITS AND YOU'RE TERMINATED
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const hitFlash = document.getElementById('hitFlash');
const waveAnnounce = document.getElementById('waveAnnounce');

// ─── GAME STATE ─────────────────────────────────────────────────────────────
let game = null;
let animId = null;

// ─── CANVAS SIZING ──────────────────────────────────────────────────────────
function resize() {
  const size = Math.min(window.innerWidth, window.innerHeight) - 80;
  canvas.width = size;
  canvas.height = size;
  if (game) game.arenaSize = size;
}
window.addEventListener('resize', resize);
resize();

const WAVE_COUNT = 10;
const PLAYER_SPEED = 4;
const BULLET_SPEED = 10;
const ENEMY_RADIUS = 14;
const PLAYER_RADIUS = 14;
const BULLET_RADIUS = 5;
const SHOOT_COOLDOWN = 250; // ms
const INVINCIBLE_DURATION = 1500; // ms after getting hit

const keys = {};
let mouseX = 0, mouseY = 0;
let mouseDown = false;
let spaceDown = false;

window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') { spaceDown = true; e.preventDefault(); }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === ' ') spaceDown = false;
});
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener('mousedown', () => mouseDown = true);
canvas.addEventListener('mouseup',   () => mouseDown = false);

// ─── GAME OBJECT ─────────────────────────────────────────────────────────────
class Game {
  constructor() {
    this.arenaSize = canvas.width;
    this.state = 'playing'; // playing | wave_break | win | dead
    this.score = 0;
    this.wave = 1;
    this.lives = 3;
    this.lastTime = performance.now();

    this.player = {
      x: this.arenaSize / 2,
      y: this.arenaSize / 2,
      angle: 0,
      lastShot: 0,
      invincibleUntil: 0,
      flashPhase: 0,
    };

    this.enemies = [];
    this.bullets = [];
    this.particles = [];

    this.waveBreakTimer = 0;
    this.spawnWave(1);
  }

  // ── WAVE SPAWNING ──────────────────────────────────────────────────────────
  spawnWave(waveNum) {
    this.enemies = [];

    if (waveNum === 10) {
      // BOSS wave
      this.enemies.push(this.makeBoss());
      return;
    }

    const count = 3 + waveNum * 2;
    const speed = 0.7 + waveNum * 0.18;
    const isSplitter = waveNum >= 7;

    for (let i = 0; i < count; i++) {
      this.enemies.push(this.makeEnemy(speed, isSplitter && i % 3 === 0));
    }
  }

  makeEnemy(speed, splitter = false) {
    const s = this.arenaSize;
    const edge = Math.floor(Math.random() * 4);
    let x, y;
    if (edge === 0) { x = Math.random() * s; y = -ENEMY_RADIUS; }
    else if (edge === 1) { x = s + ENEMY_RADIUS; y = Math.random() * s; }
    else if (edge === 2) { x = Math.random() * s; y = s + ENEMY_RADIUS; }
    else              { x = -ENEMY_RADIUS; y = Math.random() * s; }

    return {
      x, y,
      speed,
      splitter,
      isBoss: false,
      hp: 1,
      maxHp: 1,
      radius: ENEMY_RADIUS,
      wobbleOffset: Math.random() * Math.PI * 2,
      wobbleSpeed: 1 + Math.random(),
      hitFlash: 0,
    };
  }

  makeBoss() {
    const s = this.arenaSize;
    return {
      x: s / 2, y: -60,
      speed: 0.9,
      splitter: false,
      isBoss: true,
      hp: 25,
      maxHp: 25,
      radius: 36,
      wobbleOffset: 0,
      wobbleSpeed: 0.5,
      hitFlash: 0,
    };
  }

  // ── MAIN UPDATE ──────────────────────────────────────────────────────────
  update(now) {
    const dt = Math.min(now - this.lastTime, 50);
    this.lastTime = now;

    if (this.state === 'wave_break') {
      this.waveBreakTimer -= dt;
      if (this.waveBreakTimer <= 0) {
        this.state = 'playing';
        this.wave++;
        this.spawnWave(this.wave);
        this.showWaveAnnounce(this.wave === 10 ? '⚠ BOSS WAVE' : `WAVE ${this.wave}`);
      }
      return;
    }

    if (this.state !== 'playing') return;

    const p = this.player;
    const t = now / 1000;

    // Player movement
    const moving = keys['w'] || keys['a'] || keys['s'] || keys['d'] ||
                   keys['arrowup'] || keys['arrowleft'] || keys['arrowdown'] || keys['arrowright'];
    if (moving) {
      let dx = 0, dy = 0;
      if (keys['w'] || keys['arrowup'])    dy -= 1;
      if (keys['s'] || keys['arrowdown'])  dy += 1;
      if (keys['a'] || keys['arrowleft'])  dx -= 1;
      if (keys['d'] || keys['arrowright']) dx += 1;
      const len = Math.hypot(dx, dy) || 1;
      dx /= len; dy /= len;
      p.x = Math.max(PLAYER_RADIUS, Math.min(this.arenaSize - PLAYER_RADIUS, p.x + dx * PLAYER_SPEED));
      p.y = Math.max(PLAYER_RADIUS, Math.min(this.arenaSize - PLAYER_RADIUS, p.y + dy * PLAYER_SPEED));
    }

    // Aim
    p.angle = Math.atan2(mouseY - p.y, mouseX - p.x);

    // Shoot
    const wantShoot = mouseDown || spaceDown;
    if (wantShoot && now - p.lastShot > SHOOT_COOLDOWN) {
      p.lastShot = now;
      this.bullets.push({
        x: p.x + Math.cos(p.angle) * PLAYER_RADIUS,
        y: p.y + Math.sin(p.angle) * PLAYER_RADIUS,
        dx: Math.cos(p.angle) * BULLET_SPEED,
        dy: Math.sin(p.angle) * BULLET_SPEED,
        life: 1,
      });
    }

    // Move bullets
    for (let i = this.bullets.length - 1; i >= 0; i--) {
      const b = this.bullets[i];
      b.x += b.dx;
      b.y += b.dy;
      if (b.x < 0 || b.x > this.arenaSize || b.y < 0 || b.y > this.arenaSize) {
        this.bullets.splice(i, 1);
      }
    }

    // Move enemies + check bullet collisions
    for (let ei = this.enemies.length - 1; ei >= 0; ei--) {
      const e = this.enemies[ei];
      const dx = p.x - e.x;
      const dy = p.y - e.y;
      const dist = Math.hypot(dx, dy) || 1;
      const wobble = Math.sin(t * e.wobbleSpeed * 2 + e.wobbleOffset) * 2;
      e.x += (dx / dist) * e.speed + Math.cos(t * e.wobbleSpeed + e.wobbleOffset) * wobble * 0.3;
      e.y += (dy / dist) * e.speed + Math.sin(t * e.wobbleSpeed + e.wobbleOffset) * wobble * 0.3;
      if (e.hitFlash > 0) e.hitFlash -= dt;

      // Bullet vs enemy
      for (let bi = this.bullets.length - 1; bi >= 0; bi--) {
        const b = this.bullets[bi];
        if (Math.hypot(b.x - e.x, b.y - e.y) < e.radius + BULLET_RADIUS) {
          this.bullets.splice(bi, 1);
          e.hp--;
          e.hitFlash = 120;
          this.addParticles(e.x, e.y, e.isBoss ? '#ff4444' : '#ff6b35', 4);
          if (e.hp <= 0) {
            this.score += e.isBoss ? 500 : (e.splitter ? 20 : 10);
            // Splitter
            if (e.splitter && !e.isBoss) {
              for (let s = 0; s < 2; s++) {
                const ne = this.makeEnemy(e.speed * 1.3, false);
                ne.x = e.x + (s === 0 ? -20 : 20);
                ne.y = e.y;
                ne.radius = ENEMY_RADIUS * 0.7;
                this.enemies.push(ne);
              }
            }
            this.addParticles(e.x, e.y, e.isBoss ? '#ff0000' : '#ff6b35', 12);
            this.enemies.splice(ei, 1);
          }
          break;
        }
      }
    }

    // Player vs enemy
    const invincible = now < p.invincibleUntil;
    if (!invincible) {
      for (let ei = this.enemies.length - 1; ei >= 0; ei--) {
        const e = this.enemies[ei];
        if (Math.hypot(p.x - e.x, p.y - e.y) < PLAYER_RADIUS + e.radius - 6) {
          this.lives--;
          p.invincibleUntil = now + INVINCIBLE_DURATION;
          this.doHitFlash();
          if (!e.isBoss) this.enemies.splice(ei, 1); // regular enemies disappear on hit
          if (this.lives <= 0) {
            this.state = 'dead';
            this.showGameOver();
          }
          break;
        }
      }
    }

    // Update particles
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const pt = this.particles[i];
      pt.x += pt.dx;
      pt.y += pt.dy;
      pt.life -= dt * 0.002;
      if (pt.life <= 0) this.particles.splice(i, 1);
    }

    // Wave clear
    if (this.enemies.length === 0 && this.state === 'playing') {
      this.score += 100;
      if (this.wave >= WAVE_COUNT) {
        this.state = 'win';
        this.showWin();
      } else {
        this.state = 'wave_break';
        this.waveBreakTimer = 2000;
        this.showWaveAnnounce(`WAVE ${this.wave} CLEAR`);
      }
    }
  }

  addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      this.particles.push({
        x, y,
        dx: Math.cos(angle) * speed,
        dy: Math.sin(angle) * speed,
        color,
        life: 0.8 + Math.random() * 0.4,
        size: 2 + Math.random() * 3,
      });
    }
  }

  doHitFlash() {
    hitFlash.style.background = 'rgba(255,0,0,0.35)';
    setTimeout(() => hitFlash.style.background = 'rgba(255,0,0,0)', 300);
  }

  showWaveAnnounce(text) {
    waveAnnounce.textContent = text;
    waveAnnounce.style.opacity = '1';
    setTimeout(() => waveAnnounce.style.opacity = '0', 1200);
  }

  showGameOver() {
    overlay.style.display = 'flex';
    document.getElementById('overlayTitle').textContent = 'TERMINATED';
    document.getElementById('overlayTitle').style.color = '#f44336';
    document.getElementById('overlaySub').textContent = `Survived to wave ${this.wave}`;
    document.getElementById('overlayScore').textContent = `SCORE: ${this.score}`;
    document.getElementById('overlayBtn').textContent = '↺ TRY AGAIN';
    document.getElementById('overlayBtn').onclick = startGame;
  }

  showWin() {
    overlay.style.display = 'flex';
    document.getElementById('overlayTitle').textContent = 'ESCAPED';
    document.getElementById('overlayTitle').style.color = '#4caf50';
    document.getElementById('overlaySub').textContent = 'All 10 waves survived. You are free.';
    document.getElementById('overlayScore').textContent = `FINAL SCORE: ${this.score}`;
    document.getElementById('overlayBtn').textContent = '↺ PLAY AGAIN';
    document.getElementById('overlayBtn').onclick = startGame;
  }

  // ── DRAW ──────────────────────────────────────────────────────────────────
  draw(now) {
    const s = this.arenaSize;
    const p = this.player;

    // Background
    ctx.fillStyle = '#0d0d14';
    ctx.fillRect(0, 0, s, s);

    // Grid lines
    ctx.strokeStyle = '#15151f';
    ctx.lineWidth = 1;
    const gridSize = 60;
    for (let x = 0; x <= s; x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, s); ctx.stroke();
    }
    for (let y = 0; y <= s; y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(s, y); ctx.stroke();
    }

    // Arena border glow
    ctx.strokeStyle = '#1e1e30';
    ctx.lineWidth = 3;
    ctx.strokeRect(0, 0, s, s);

    // Particles
    for (const pt of this.particles) {
      ctx.globalAlpha = pt.life;
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Enemies
    for (const e of this.enemies) {
      const hitPulse = e.hitFlash > 0 ? e.hitFlash / 120 : 0;
      if (e.isBoss) {
        // Boss — pulsing red hexagon-ish (octagon)
        ctx.shadowBlur = 20 + hitPulse * 30;
        ctx.shadowColor = '#ff0000';
        ctx.fillStyle = hitPulse > 0 ? `rgba(255, ${Math.floor(200 * (1-hitPulse))}, ${Math.floor(200*(1-hitPulse))}, 1)` : '#cc2200';
        ctx.beginPath();
        const sides = 8;
        for (let i = 0; i < sides; i++) {
          const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
          const r = e.radius + Math.sin(now / 300 + i) * 4;
          if (i === 0) ctx.moveTo(e.x + Math.cos(a) * r, e.y + Math.sin(a) * r);
          else ctx.lineTo(e.x + Math.cos(a) * r, e.y + Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        ctx.shadowBlur = 0;

        // Boss HP bar
        const bw = 80, bh = 8;
        ctx.fillStyle = '#330000';
        ctx.fillRect(e.x - bw/2, e.y - e.radius - 18, bw, bh);
        ctx.fillStyle = '#ff2200';
        ctx.fillRect(e.x - bw/2, e.y - e.radius - 18, bw * (e.hp / e.maxHp), bh);

      } else {
        // Regular enemy — red circle with inner X
        ctx.shadowBlur = 10 + hitPulse * 20;
        ctx.shadowColor = '#ff3300';
        ctx.fillStyle = hitPulse > 0 ? '#ffffff' : (e.splitter ? '#ff9900' : '#cc2200');
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // X mark
        const xr = e.radius * 0.5;
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(e.x - xr, e.y - xr); ctx.lineTo(e.x + xr, e.y + xr);
        ctx.moveTo(e.x + xr, e.y - xr); ctx.lineTo(e.x - xr, e.y + xr);
        ctx.stroke();
      }
    }

    // Bullets
    for (const b of this.bullets) {
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#00ffe0';
      ctx.fillStyle = '#00ffe0';
      ctx.beginPath();
      ctx.arc(b.x, b.y, BULLET_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      // tracer
      ctx.strokeStyle = 'rgba(0,255,220,0.3)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(b.x - b.dx * 3, b.y - b.dy * 3);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Player
    const invincible = now < p.invincibleUntil;
    if (!invincible || Math.floor(now / 100) % 2 === 0) {
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#00ff88';
      ctx.fillStyle = invincible ? '#88ffbb' : '#00cc66';
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Direction indicator
      ctx.strokeStyle = '#00ff88';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(
        p.x + Math.cos(p.angle) * (PLAYER_RADIUS + 10),
        p.y + Math.sin(p.angle) * (PLAYER_RADIUS + 10)
      );
      ctx.stroke();
    }

    // UI
    document.getElementById('uiWave').textContent = this.wave;
    document.getElementById('uiScore').textContent = this.score;
    document.getElementById('uiLives').textContent = '❤'.repeat(this.lives) + '♡'.repeat(3 - this.lives);
  }
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
function loop(now) {
  if (!game) return;
  game.update(now);
  game.draw(now);
  animId = requestAnimationFrame(loop);
}

function startGame() {
  if (animId) cancelAnimationFrame(animId);
  overlay.style.display = 'none';
  resize();
  game = new Game();
  game.showWaveAnnounce('WAVE 1');
  animId = requestAnimationFrame(loop);
}

// Start on click
document.getElementById('overlayBtn').addEventListener('click', startGame);
</script>
</body>
</html>
