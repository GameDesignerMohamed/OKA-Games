<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLUX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #ui {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      color: #fff;
      z-index: 10;
    }

    #timer {
      position: absolute;
      top: 20px; left: 24px;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 12px #fff;
      letter-spacing: 2px;
    }

    #score {
      position: absolute;
      top: 20px; right: 24px;
      font-size: 28px;
      font-weight: bold;
      text-align: right;
      text-shadow: 0 0 12px #fff;
    }

    #hp {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      letter-spacing: 6px;
      text-shadow: 0 0 10px #f44;
    }

    #weapon-label {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      letter-spacing: 4px;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 0 16px currentColor;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: all;
      cursor: pointer;
    }

    #overlay h1 {
      font-size: 72px;
      letter-spacing: 12px;
      text-shadow: 0 0 30px #fff, 0 0 60px #aaf;
      margin-bottom: 20px;
    }

    #overlay .sub {
      font-size: 18px;
      letter-spacing: 4px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    #overlay .hint {
      font-size: 14px;
      letter-spacing: 3px;
      opacity: 0.45;
      margin-top: 30px;
    }

    #overlay .final-score {
      font-size: 42px;
      margin: 16px 0;
      text-shadow: 0 0 20px #8ff;
    }

    #overlay .weapon-next {
      font-size: 16px;
      opacity: 0.6;
      margin-top: 10px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="timer">45</div>
    <div id="score">0</div>
    <div id="hp">♥ ♥ ♥</div>
    <div id="weapon-label"></div>
  </div>

  <div id="overlay">
    <h1>FLUX</h1>
    <div class="sub">45 SECONDS. ONE WEAPON. MASTER IT.</div>
    <div class="sub" style="margin-top:8px; font-size:14px; opacity:0.5;">WASD · MOUSE AIM · CLICK FIRE</div>
    <div class="hint">CLICK TO START</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
