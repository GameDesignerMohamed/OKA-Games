<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chain Reaction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;cursor:none}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;display:flex;gap:40px;padding:14px 32px;
  background:rgba(0,0,0,.75);border-bottom:1px solid rgba(255,150,0,.2);
  justify-content:center;align-items:center;pointer-events:none}
.hl{font-size:10px;color:#664422;letter-spacing:2px;text-transform:uppercase}
.hv{font-size:22px;font-weight:700;color:#ffaa44}
#chain{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:0;font-weight:900;letter-spacing:4px;color:#fff;
  text-shadow:0 0 40px currentColor;pointer-events:none;text-align:center}
#perfect{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:64px;font-weight:900;letter-spacing:8px;color:#ff6600;
  text-shadow:0 0 80px #ff6600,0 0 140px #ff3300;
  pointer-events:none;opacity:0;text-align:center;text-transform:uppercase;transition:opacity .4s}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.93);
  display:flex;flex-direction:column;align-items:center;justify-content:center}
#overlay h1{font-size:52px;font-weight:900;letter-spacing:6px;color:#ff6600;
  text-shadow:0 0 60px #ff6600;margin-bottom:10px}
.sub{font-size:15px;color:#886644;letter-spacing:3px;margin-bottom:36px;text-align:center;line-height:2}
#btn{background:#ff6600;color:#000;border:none;padding:14px 44px;font-size:16px;
  font-weight:900;letter-spacing:4px;cursor:pointer;border-radius:3px;text-transform:uppercase;
  box-shadow:0 0 40px rgba(255,102,0,.5);transition:all .2s}
#btn:hover{background:#ff8800;transform:scale(1.06)}
#xhair{position:fixed;pointer-events:none;width:18px;height:18px;transform:translate(-50%,-50%);z-index:9999}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,180,80,.7);
  left:50%;top:50%;transform:translate(-50%,-50%)}
#xhair::before{width:1px;height:18px}
#xhair::after{width:18px;height:1px}
#warn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  font-size:12px;color:#ff4444;letter-spacing:2px;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="xhair"></div>
<div id="hud">
  <div><div class="hl">Score</div><div class="hv" id="hs">0</div></div>
  <div><div class="hl">Wave</div><div class="hv" id="hw">1/5</div></div>
  <div><div class="hl">Shots</div><div class="hv" id="hsh">1</div></div>
  <div><div class="hl">Best Chain</div><div class="hv" id="hb">0</div></div>
</div>
<div id="chain"></div>
<div id="perfect">PERFECT CHAIN!</div>
<div id="warn">NO SHOTS REMAINING</div>
<div id="overlay">
  <h1>⛓ CHAIN REACTION</h1>
  <div class="sub" id="sub">ONE SHOT. INFINITE CHAIN.<br>AIM FOR THE CLUSTER. DETONATE EVERYTHING.</div>
  <button id="btn">FIRE FIRST SHOT</button>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"}}</script>
<script type="module" src="game.js"></script>
</body>
</html>
