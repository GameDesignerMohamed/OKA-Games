<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse — Rhythm Bullet-Hell</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #hud {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 20px; align-items: center;
      pointer-events: none; z-index: 10;
    }
    .heart { font-size: 28px; transition: opacity 0.3s; filter: drop-shadow(0 0 8px #ff3366); }
    .heart.lost { opacity: 0.15; filter: none; }
    #wave-lbl { color:#fff; font-size:13px; font-weight:bold; letter-spacing:3px; opacity:0.7; }
    #score-lbl { color:#fff; font-size:13px; font-weight:bold; letter-spacing:2px; }
    #beat-wrap { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); text-align:center; pointer-events:none; z-index:10; }
    #beat-hint { color:rgba(255,255,255,0.35); font-size:10px; letter-spacing:2px; margin-bottom:6px; }
    #beat-bar { width:200px; height:5px; background:rgba(255,255,255,0.1); border-radius:3px; overflow:hidden; }
    #beat-fill { height:100%; background:linear-gradient(90deg,#00ffcc,#ff3399); border-radius:3px; width:0; }
    #feedback {
      position:fixed; top:42%; left:50%; transform:translate(-50%,-50%);
      font-size:20px; font-weight:bold; letter-spacing:4px; text-transform:uppercase;
      opacity:0; pointer-events:none; z-index:15; text-shadow:0 0 20px currentColor;
    }
    #wave-ann {
      position:fixed; top:38%; left:50%; transform:translate(-50%,-50%);
      font-size:34px; font-weight:900; letter-spacing:8px; color:#fff;
      text-shadow:0 0 30px #ff3399; opacity:0; pointer-events:none; z-index:15;
      transition: opacity 0.8s;
    }
    #combo-lbl {
      position:fixed; top:70px; left:50%; transform:translateX(-50%);
      font-size:11px; letter-spacing:3px; color:#00ffcc;
      opacity:0; pointer-events:none; text-shadow:0 0 10px #00ffcc; z-index:10;
    }
    #boss-wrap {
      display:none; position:fixed; bottom:55px; left:50%; transform:translateX(-50%);
      width:300px; text-align:center; z-index:10;
    }
    #boss-lbl { font-size:10px; letter-spacing:4px; color:rgba(255,80,80,0.7); margin-bottom:4px; }
    #boss-bar { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
    #boss-fill { height:100%; background:linear-gradient(90deg,#ff0055,#ff6600); border-radius:4px; transition:width 0.2s; }
    #overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:rgba(0,0,0,0.88); z-index:20;
    }
    #overlay h1 {
      font-size:clamp(48px,8vw,80px); font-weight:900; letter-spacing:12px; color:#fff;
      text-shadow:0 0 40px #ff3399, 0 0 80px #aa00ff; margin-bottom:14px;
    }
    .sub { font-size:12px; letter-spacing:5px; color:rgba(255,255,255,0.4); margin-bottom:10px; }
    .ctrl { font-size:11px; letter-spacing:2px; color:rgba(255,255,255,0.3); margin-bottom:44px; }
    .btn {
      font-family:'Courier New',monospace; font-size:13px; letter-spacing:4px;
      text-transform:uppercase; color:#fff;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.2);
      padding:13px 38px; border-radius:4px; cursor:pointer; transition:all 0.2s;
    }
    .btn:hover { background:rgba(255,51,153,0.25); border-color:#ff3399; box-shadow:0 0 20px rgba(255,51,153,0.3); }
  </style>
</head>
<body>

<div id="hud">
  <div id="wave-lbl">WAVE 1</div>
  <div class="heart" id="h1">❤️</div>
  <div class="heart" id="h2">❤️</div>
  <div class="heart" id="h3">❤️</div>
  <div id="score-lbl">0</div>
</div>
<div id="beat-wrap">
  <div id="beat-hint">BEAT WINDOW</div>
  <div id="beat-bar"><div id="beat-fill"></div></div>
</div>
<div id="feedback"></div>
<div id="wave-ann"></div>
<div id="combo-lbl"></div>
<div id="boss-wrap">
  <div id="boss-lbl">BOSS</div>
  <div id="boss-bar"><div id="boss-fill"></div></div>
</div>

<div id="overlay">
  <h1>PULSE</h1>
  <div class="sub">RHYTHM BULLET-HELL</div>
  <div class="ctrl">MOUSE MOVE · CLICK / SPACE TO SHOOT · DODGE THE RINGS</div>
  <button class="btn" id="start-btn">▶ START</button>
</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"}}
</script>
<script type="module" src="game.js"></script>
</body>
</html>
