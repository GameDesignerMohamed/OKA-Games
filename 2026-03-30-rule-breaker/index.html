<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rule Breaker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    color: #fff;
  }

  #hud {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 40px;
    align-items: center;
    background: rgba(0,0,0,0.5);
    padding: 8px 24px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 14px;
  }

  #health-bar {
    display: flex;
    gap: 6px;
  }

  .health-pip {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #ff4444;
    border: 1px solid rgba(255,255,255,0.3);
  }
  .health-pip.empty { background: #333; }

  #timer { font-size: 22px; font-weight: bold; color: #fff; }
  #score-display { color: #aaa; font-size: 13px; }
  #round-display { color: #ffd700; font-size: 13px; }

  #modifier-banner {
    position: absolute;
    top: 70px; left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,200,0,0.4);
    color: #ffd700;
    padding: 6px 18px;
    border-radius: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    display: none;
  }

  /* VOTE SCREEN */
  #vote-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    display: none;
  }

  #vote-title {
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  #vote-subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 40px;
  }

  #vote-cards {
    display: flex;
    gap: 20px;
  }

  .vote-card {
    width: 200px;
    background: rgba(20, 20, 30, 0.9);
    border: 2px solid rgba(100,100,200,0.4);
    border-radius: 12px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.15s ease;
    text-align: center;
  }

  .vote-card:hover {
    border-color: rgba(150,150,255,0.9);
    background: rgba(30, 30, 60, 0.9);
    transform: translateY(-4px);
    box-shadow: 0 8px 30px rgba(100,100,255,0.3);
  }

  .vote-card-icon { font-size: 36px; margin-bottom: 12px; }
  .vote-card-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 8px; }
  .vote-card-desc { font-size: 12px; color: #888; line-height: 1.4; }
  .vote-card-tag { font-size: 10px; color: #6688ff; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }

  /* TITLE SCREEN */
  #title-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
  }

  #title-screen h1 {
    font-size: 56px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  #title-screen h1 span { color: #ff4444; }

  #title-tagline {
    font-size: 16px;
    color: #888;
    margin-bottom: 50px;
    max-width: 400px;
    text-align: center;
    line-height: 1.6;
  }

  #start-btn {
    background: #fff;
    color: #000;
    border: none;
    padding: 16px 48px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 4px;
    transition: all 0.1s;
  }

  #start-btn:hover { background: #ffd700; }

  /* ROUND FLASH */
  #round-flash {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 4px;
    pointer-events: none;
    opacity: 0;
    transition: none;
  }

  /* GAME OVER / WIN */
  #end-screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: all;
    display: none;
  }

  #end-title {
    font-size: 52px;
    font-weight: bold;
    margin-bottom: 20px;
    letter-spacing: 3px;
  }

  #end-score { font-size: 24px; color: #aaa; margin-bottom: 30px; }

  #end-modifiers {
    background: rgba(20,20,30,0.9);
    border: 1px solid rgba(255,100,100,0.3);
    border-radius: 10px;
    padding: 20px 32px;
    margin-bottom: 36px;
    text-align: center;
    max-width: 480px;
  }

  #end-modifiers h3 {
    font-size: 13px;
    color: #ff4444;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  #end-vote-history {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .end-vote-item {
    font-size: 14px;
    color: #ccc;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .end-vote-round { color: #666; font-size: 12px; min-width: 70px; }

  #restart-btn {
    background: transparent;
    color: #fff;
    border: 2px solid rgba(255,255,255,0.4);
    padding: 12px 40px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  #restart-btn:hover { border-color: #fff; background: rgba(255,255,255,0.1); }

  /* SCREEN SHAKE */
  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-4px,2px); }
    40% { transform: translate(4px,-2px); }
    60% { transform: translate(-3px,3px); }
    80% { transform: translate(3px,-1px); }
    100% { transform: translate(0,0); }
  }
  .shaking { animation: shake 0.2s ease; }

  /* CROSSHAIR */
  #crosshair {
    position: fixed;
    pointer-events: none;
    width: 20px; height: 20px;
    transform: translate(-50%, -50%);
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.6);
  }
  #crosshair::before { width: 2px; height: 20px; left: 9px; top: 0; }
  #crosshair::after { width: 20px; height: 2px; top: 9px; left: 0; }
</style>
</head>
<body>

<div id="crosshair"></div>

<div id="ui">
  <div id="hud" style="display:none">
    <div id="health-bar"></div>
    <div id="timer">30</div>
    <div id="round-display">ROUND 1/3</div>
    <div id="score-display">SCORE: 0</div>
  </div>
  <div id="modifier-banner"></div>
  <div id="round-flash"></div>
</div>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <h1>RULE <span>BREAKER</span></h1>
  <p id="title-tagline">Vote to bend the rules. Survive your own chaos.<br>3 rounds. Your choice. Your fault.</p>
  <button id="start-btn" onclick="startGame()">PLAY</button>
</div>

<!-- VOTE SCREEN -->
<div id="vote-screen">
  <div id="vote-title">CHOOSE YOUR CHAOS</div>
  <div id="vote-subtitle">You voted for this. You survive with it.</div>
  <div id="vote-cards"></div>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div id="end-title">GAME OVER</div>
  <div id="end-score">SCORE: 0</div>
  <div id="end-modifiers">
    <h3>YOU VOTED FOR THIS 💀</h3>
    <div id="end-vote-history"></div>
  </div>
  <button id="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const ARENA_SIZE = 12;
const ROUND_DURATION = 30;
const TOTAL_ROUNDS = 3;
const PLAYER_SPEED = 6;
const BULLET_SPEED = 14;
const ENEMY_BASE_SPEED = 2.2;
const SHOOT_COOLDOWN = 0.22;
const MAX_HEALTH = 3;

// ─── MODIFIER DEFINITIONS ────────────────────────────────────────────────────
const MODIFIERS = {
  gravity_flip: {
    id: 'gravity_flip',
    name: 'Gravity Flip',
    icon: '🌀',
    desc: 'Enemies spawn from above, fall downward. Repositioning > dodging.',
    tag: 'requires: spatial awareness',
    skillClass: 'repositioning'
  },
  tiny_you: {
    id: 'tiny_you',
    name: 'Tiny You',
    icon: '🔬',
    desc: 'Player sphere shrinks 60%. Hitbox tiny — but bullets shrink too.',
    tag: 'requires: precision aim',
    skillClass: 'precision'
  },
  slow_world: {
    id: 'slow_world',
    name: 'Slow World',
    icon: '🕐',
    desc: 'Everything moves at 40% speed. Patience wins — not reflexes.',
    tag: 'requires: timing',
    skillClass: 'timing'
  },
  mirror_mode: {
    id: 'mirror_mode',
    name: 'Mirror Mode',
    icon: '🪞',
    desc: 'WASD controls are inverted. Your muscle memory is the enemy.',
    tag: 'requires: rewiring',
    skillClass: 'adaptation'
  },
  turret_only: {
    id: 'turret_only',
    name: 'Turret Only',
    icon: '🔩',
    desc: 'You can\'t move. Auto-aim fires constantly. Position at start matters.',
    tag: 'requires: prediction',
    skillClass: 'prediction'
  }
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = 'title'; // title | playing | voting | end
let round = 1;
let health = MAX_HEALTH;
let score = 0;
let roundTimer = ROUND_DURATION;
let shootTimer = 0;
let activeModifier = null;
let voteHistory = [];
let enemies = [];
let bullets = [];
let particles = [];
let stars = [];
let enemySpawnTimer = 0;
let enemySpawnInterval = 2.0;
let shakeTime = 0;
let shakeIntensity = 0;

// ─── SCENE ───────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000008, 0.04);

const camera = new THREE.OrthographicCamera(-18, 18, 10.1, -10.1, 0.1, 200);
camera.position.set(0, 0, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// Resize handler
window.addEventListener('resize', () => {
  const aspect = window.innerWidth / window.innerHeight;
  const h = 10.1;
  camera.left = -h * aspect * 1.78;
  camera.right = h * aspect * 1.78;
  camera.top = h;
  camera.bottom = -h;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// Post-processing
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.4, 0.85);
composer.addPass(bloomPass);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 2.0);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 5, 20);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x4466ff, 1.5, 30);
pointLight.position.set(0, 0, 5);
scene.add(pointLight);

// ─── STARFIELD ────────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 800; i++) {
  starVerts.push(
    (Math.random() - 0.5) * 80,
    (Math.random() - 0.5) * 60,
    -(Math.random() * 30 + 5)
  );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
scene.add(new THREE.Points(starGeo, starMat));

// ─── ARENA FLOOR ─────────────────────────────────────────────────────────────
const arenaGeo = new THREE.PlaneGeometry(ARENA_SIZE * 2, ARENA_SIZE * 2, 24, 24);
const arenaMat = new THREE.MeshStandardMaterial({
  color: 0x080818,
  wireframe: false,
  roughness: 0.9,
  metalness: 0.1
});
const arena = new THREE.Mesh(arenaGeo, arenaMat);
arena.position.z = -0.5;
scene.add(arena);

// Arena border
const borderGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(ARENA_SIZE * 2, ARENA_SIZE * 2));
const borderMat = new THREE.LineBasicMaterial({ color: 0x224488, linewidth: 2 });
const border = new THREE.LineSegments(borderGeo, borderMat);
border.position.z = -0.4;
scene.add(border);

// ─── PLAYER ──────────────────────────────────────────────────────────────────
const playerGeo = new THREE.SphereGeometry(0.4, 16, 16);
const playerMat = new THREE.MeshStandardMaterial({
  color: 0x44ffcc,
  emissive: 0x44ffcc,
  emissiveIntensity: 0.3,
  roughness: 0.3,
  metalness: 0.7
});
const player = new THREE.Mesh(playerGeo, playerMat);
player.position.set(0, 0, 0);
scene.add(player);

// Player glow ring
const ringGeo = new THREE.RingGeometry(0.5, 0.65, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x44ffcc, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
const playerRing = new THREE.Mesh(ringGeo, ringMat);
player.add(playerRing);

// ─── INPUT ───────────────────────────────────────────────────────────────────
const keys = {};
let mouseX = 0, mouseY = 0;
let mouseWorldX = 0, mouseWorldY = 0;
let shooting = false;

window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  // Convert to world coords
  const nx = (e.clientX / window.innerWidth) * 2 - 1;
  const ny = -(e.clientY / window.innerHeight) * 2 + 1;
  const aspect = window.innerWidth / window.innerHeight;
  const h = 10.1;
  mouseWorldX = nx * h * aspect * 1.78;
  mouseWorldY = ny * h;

  document.getElementById('crosshair').style.left = e.clientX + 'px';
  document.getElementById('crosshair').style.top = e.clientY + 'px';
});
window.addEventListener('mousedown', e => { if (e.button === 0) shooting = true; });
window.addEventListener('mouseup', e => { if (e.button === 0) shooting = false; });

// ─── AUDIO ───────────────────────────────────────────────────────────────────
let audioCtx = null;

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(freq, type, duration, vol = 0.3) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = type;
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playSound(440, 'square', 0.08, 0.1); }
function sfxHit() {
  playSound(180, 'sawtooth', 0.15, 0.25);
  playSound(120, 'sine', 0.2, 0.2);
}
function sfxKill() {
  playSound(300, 'square', 0.1, 0.2);
  playSound(600, 'sine', 0.15, 0.15);
}
function sfxDie() {
  playSound(100, 'sawtooth', 0.5, 0.4);
  playSound(80, 'sine', 0.6, 0.4);
}
function sfxVoteClick() {
  playSound(520, 'sine', 0.1, 0.2);
  playSound(660, 'sine', 0.15, 0.15);
}
function sfxRoundStart() {
  playSound(440, 'sine', 0.15, 0.2);
  playSound(660, 'sine', 0.2, 0.2);
  playSound(880, 'sine', 0.25, 0.2);
}

// BGM
let bgmNode = null;
function startBGM() {
  if (!audioCtx || bgmNode) return;
  const notes = [220, 246, 262, 294, 330];
  let idx = 0;
  function scheduleNote() {
    if (state === 'end') return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = notes[idx % notes.length];
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
    idx++;
    bgmNode = setTimeout(scheduleNote, 320);
  }
  scheduleNote();
}

// ─── ENEMY FACTORY ───────────────────────────────────────────────────────────
function spawnEnemy() {
  const geo = new THREE.OctahedronGeometry(0.35 + Math.random() * 0.2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff3322,
    emissive: 0xff2200,
    emissiveIntensity: 0.4,
    roughness: 0.3,
    metalness: 0.5
  });
  const mesh = new THREE.Mesh(geo, mat);

  let spawnX, spawnY;

  if (activeModifier === 'gravity_flip') {
    // Spawn from top edge
    spawnX = (Math.random() - 0.5) * ARENA_SIZE * 2;
    spawnY = ARENA_SIZE + 1;
  } else {
    // Spawn from random edge
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { spawnX = -ARENA_SIZE - 1; spawnY = (Math.random() - 0.5) * ARENA_SIZE * 2; }
    else if (side === 1) { spawnX = ARENA_SIZE + 1; spawnY = (Math.random() - 0.5) * ARENA_SIZE * 2; }
    else if (side === 2) { spawnX = (Math.random() - 0.5) * ARENA_SIZE * 2; spawnY = -ARENA_SIZE - 1; }
    else { spawnX = (Math.random() - 0.5) * ARENA_SIZE * 2; spawnY = ARENA_SIZE + 1; }
  }

  mesh.position.set(spawnX, spawnY, 0);

  const speedMult = (activeModifier === 'slow_world') ? 0.4 : 1.0;
  const speed = (ENEMY_BASE_SPEED + Math.random() * 0.8) * speedMult;

  scene.add(mesh);
  enemies.push({ mesh, speed, hp: 1, hitFlash: 0 });
}

// ─── BULLET FACTORY ──────────────────────────────────────────────────────────
function fireBullet() {
  const dx = mouseWorldX - player.position.x;
  const dy = mouseWorldY - player.position.y;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;

  const size = (activeModifier === 'tiny_you') ? 0.08 : 0.15;
  const geo = new THREE.SphereGeometry(size, 8, 8);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffff44,
    emissive: 0xffff44,
    emissiveIntensity: 1.0
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(player.position);
  mesh.position.z = 0;
  scene.add(mesh);

  const speedMult = (activeModifier === 'slow_world') ? 0.4 : 1.0;
  const bspeed = BULLET_SPEED * speedMult;

  bullets.push({
    mesh,
    vx: (dx / len) * bspeed,
    vy: (dy / len) * bspeed,
    life: 2.0
  });

  sfxShoot();
}

// ─── PARTICLE BURST ──────────────────────────────────────────────────────────
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.07, 6, 6);
    const mat = new THREE.MeshBasicMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, 0);
    scene.add(mesh);
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 4;
    particles.push({
      mesh,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.3
    });
  }
}

// ─── SCREEN SHAKE ────────────────────────────────────────────────────────────
function triggerShake(intensity = 0.3) {
  shakeIntensity = intensity;
  shakeTime = 0.2;
  document.getElementById('ui').classList.add('shaking');
  setTimeout(() => document.getElementById('ui').classList.remove('shaking'), 200);
}

// ─── PLAYER HIT ──────────────────────────────────────────────────────────────
let invincibleTime = 0;

function hitPlayer() {
  if (invincibleTime > 0) return;
  health--;
  invincibleTime = 1.5;
  sfxHit();
  triggerShake(0.5);
  playerMat.emissive.set(0xff0000);
  playerMat.emissiveIntensity = 1.0;
  setTimeout(() => {
    playerMat.emissive.set(0x44ffcc);
    playerMat.emissiveIntensity = 0.3;
  }, 300);
  updateHUD();
  if (health <= 0) endGame(false);
}

// ─── CLEAR ENTITIES ──────────────────────────────────────────────────────────
function clearEntities() {
  for (const e of enemies) scene.remove(e.mesh);
  for (const b of bullets) scene.remove(b.mesh);
  for (const p of particles) scene.remove(p.mesh);
  enemies = [];
  bullets = [];
  particles = [];
}

// ─── HUD UPDATE ──────────────────────────────────────────────────────────────
function updateHUD() {
  const hpDiv = document.getElementById('health-bar');
  hpDiv.innerHTML = '';
  for (let i = 0; i < MAX_HEALTH; i++) {
    const pip = document.createElement('div');
    pip.className = 'health-pip' + (i >= health ? ' empty' : '');
    hpDiv.appendChild(pip);
  }
  document.getElementById('score-display').textContent = `SCORE: ${score}`;
  document.getElementById('round-display').textContent = `ROUND ${round}/${TOTAL_ROUNDS}`;

  // Modifier banner
  const banner = document.getElementById('modifier-banner');
  if (activeModifier && state === 'playing') {
    const mod = MODIFIERS[activeModifier];
    banner.textContent = `⚡ ${mod.name.toUpperCase()} ACTIVE`;
    banner.style.display = 'block';
  } else {
    banner.style.display = 'none';
  }
}

// ─── APPLY MODIFIER EFFECTS ──────────────────────────────────────────────────
function applyModifier(modId) {
  activeModifier = modId;
  if (modId === 'tiny_you') {
    player.scale.setScalar(0.4);
  } else {
    player.scale.setScalar(1.0);
  }
}

// ─── SHOW VOTE SCREEN ────────────────────────────────────────────────────────
function showVoteScreen() {
  state = 'voting';
  clearEntities();

  // Pick 3 random modifiers
  const modKeys = Object.keys(MODIFIERS);
  const shuffled = modKeys.sort(() => Math.random() - 0.5).slice(0, 3);

  const container = document.getElementById('vote-cards');
  container.innerHTML = '';

  for (const modId of shuffled) {
    const mod = MODIFIERS[modId];
    const card = document.createElement('div');
    card.className = 'vote-card';
    card.innerHTML = `
      <div class="vote-card-icon">${mod.icon}</div>
      <div class="vote-card-name">${mod.name}</div>
      <div class="vote-card-desc">${mod.desc}</div>
      <div class="vote-card-tag">${mod.tag}</div>
    `;
    card.addEventListener('click', () => {
      sfxVoteClick();
      voteHistory.push({ round: round + 1, mod: modId, name: mod.name, icon: mod.icon });
      document.getElementById('vote-screen').style.display = 'none';
      applyModifier(modId);
      startRound(round + 1);
    });
    container.appendChild(card);
  }

  document.getElementById('vote-screen').style.display = 'flex';
}

// ─── ROUND FLASH ─────────────────────────────────────────────────────────────
function showRoundFlash(text, color = '#ffffff') {
  const el = document.getElementById('round-flash');
  el.textContent = text;
  el.style.color = color;
  el.style.opacity = '1';
  el.style.fontSize = '48px';
  el.style.transition = 'opacity 0.8s ease, font-size 0.4s ease';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.fontSize = '64px';
  }, 800);
}

// ─── START ROUND ─────────────────────────────────────────────────────────────
function startRound(r) {
  round = r;
  state = 'playing';
  roundTimer = ROUND_DURATION;
  enemySpawnTimer = 0;
  enemySpawnInterval = Math.max(0.5, 2.0 - (r - 1) * 0.3);
  document.getElementById('hud').style.display = 'flex';
  updateHUD();
  showRoundFlash(`ROUND ${r}`, '#ffd700');
  sfxRoundStart();
  startBGM();
}

// ─── GAME START ──────────────────────────────────────────────────────────────
window.startGame = function() {
  initAudio();
  document.getElementById('title-screen').style.display = 'none';
  health = MAX_HEALTH;
  score = 0;
  round = 1;
  activeModifier = null;
  voteHistory = [];
  player.position.set(0, 0, 0);
  player.scale.setScalar(1.0);
  clearEntities();
  startRound(1);
};

// ─── GAME RESTART ────────────────────────────────────────────────────────────
window.restartGame = function() {
  initAudio();
  document.getElementById('end-screen').style.display = 'none';
  health = MAX_HEALTH;
  score = 0;
  round = 1;
  activeModifier = null;
  voteHistory = [];
  player.position.set(0, 0, 0);
  player.scale.setScalar(1.0);
  clearEntities();
  startRound(1);
};

// ─── END GAME ────────────────────────────────────────────────────────────────
function endGame(won) {
  state = 'end';
  clearEntities();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('modifier-banner').style.display = 'none';
  if (bgmNode) { clearTimeout(bgmNode); bgmNode = null; }

  const endScreen = document.getElementById('end-screen');
  const endTitle = document.getElementById('end-title');

  if (won) {
    endTitle.textContent = '🏆 YOU SURVIVED';
    endTitle.style.color = '#ffd700';
  } else {
    endTitle.textContent = 'GAME OVER';
    endTitle.style.color = '#ff4444';
    sfxDie();
  }

  document.getElementById('end-score').textContent = `SCORE: ${score}`;

  // Vote history
  const histDiv = document.getElementById('end-vote-history');
  histDiv.innerHTML = '';
  if (voteHistory.length === 0) {
    histDiv.innerHTML = '<div class="end-vote-item" style="color:#666">No modifiers chosen (Round 1 only)</div>';
  } else {
    for (const v of voteHistory) {
      const item = document.createElement('div');
      item.className = 'end-vote-item';
      item.innerHTML = `<span class="end-vote-round">Round ${v.round}:</span><span>${v.icon} ${v.name}</span>`;
      histDiv.appendChild(item);
    }
  }

  endScreen.style.display = 'flex';
}

// ─── MAIN UPDATE LOOP ────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function update(dt) {
  if (state !== 'playing') return;

  // Invincibility timer
  if (invincibleTime > 0) invincibleTime -= dt;

  // Screen shake
  if (shakeTime > 0) {
    shakeTime -= dt;
    const s = shakeIntensity * (shakeTime / 0.2);
    camera.position.x = (Math.random() - 0.5) * s;
    camera.position.y = (Math.random() - 0.5) * s;
  } else {
    camera.position.x = 0;
    camera.position.y = 0;
  }

  // ─── PLAYER MOVEMENT ───────────────────────────────────────────────────────
  const speedMult = (activeModifier === 'slow_world') ? 0.4 : 1.0;
  const canMove = activeModifier !== 'turret_only';

  if (canMove) {
    const flipMult = (activeModifier === 'mirror_mode') ? -1 : 1;
    let px = 0, py = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    py += 1;
    if (keys['KeyS'] || keys['ArrowDown'])  py -= 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  px -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) px += 1;
    const len = Math.sqrt(px*px + py*py) || 1;
    if (px !== 0 || py !== 0) {
      player.position.x += (px / len) * PLAYER_SPEED * speedMult * flipMult * dt;
      player.position.y += (py / len) * PLAYER_SPEED * speedMult * flipMult * dt;
    }
  }

  // Clamp to arena
  const scale = player.scale.x;
  player.position.x = Math.max(-ARENA_SIZE + scale, Math.min(ARENA_SIZE - scale, player.position.x));
  player.position.y = Math.max(-ARENA_SIZE + scale, Math.min(ARENA_SIZE - scale, player.position.y));

  // Player rotation (cosmetic)
  player.rotation.z += dt * 1.5;

  // ─── SHOOTING ──────────────────────────────────────────────────────────────
  shootTimer -= dt;
  if (activeModifier === 'turret_only') {
    // Auto-fire toward closest enemy
    if (shootTimer <= 0 && enemies.length > 0) {
      let closest = null, closestDist = Infinity;
      for (const e of enemies) {
        const d = e.mesh.position.distanceTo(player.position);
        if (d < closestDist) { closestDist = d; closest = e; }
      }
      if (closest) {
        mouseWorldX = closest.mesh.position.x;
        mouseWorldY = closest.mesh.position.y;
        fireBullet();
        shootTimer = SHOOT_COOLDOWN * speedMult;
      }
    }
  } else if (shooting && shootTimer <= 0) {
    fireBullet();
    shootTimer = SHOOT_COOLDOWN * speedMult;
  }

  // ─── ENEMIES ───────────────────────────────────────────────────────────────
  enemySpawnTimer -= dt;
  if (enemySpawnTimer <= 0) {
    spawnEnemy();
    spawnEnemy(); // 2 at a time for tension
    if (round >= 3) spawnEnemy(); // 3 in round 3
    enemySpawnTimer = enemySpawnInterval;
  }

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.position.x - e.mesh.position.x;
    const dy = player.position.y - e.mesh.position.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;

    // Gravity flip: move downward primarily, slight player tracking
    let moveX, moveY;
    if (activeModifier === 'gravity_flip') {
      moveX = (dx / dist) * 0.3;
      moveY = -1.0; // primarily fall down
      const len2 = Math.sqrt(moveX*moveX + moveY*moveY);
      moveX /= len2; moveY /= len2;
    } else {
      moveX = dx / dist;
      moveY = dy / dist;
    }

    e.mesh.position.x += moveX * e.speed * speedMult * dt;
    e.mesh.position.y += moveY * e.speed * speedMult * dt;
    e.mesh.rotation.x += dt * 2;
    e.mesh.rotation.y += dt * 1.5;

    // Hit flash
    if (e.hitFlash > 0) {
      e.hitFlash -= dt;
      e.mesh.material.emissiveIntensity = 2.0;
    } else {
      e.mesh.material.emissiveIntensity = 0.4;
    }

    // Out of arena cleanup
    if (Math.abs(e.mesh.position.x) > ARENA_SIZE + 3 || Math.abs(e.mesh.position.y) > ARENA_SIZE + 3) {
      scene.remove(e.mesh);
      enemies.splice(i, 1);
      continue;
    }

    // Collision with player
    const hitRadius = (activeModifier === 'tiny_you') ? 0.3 : 0.7;
    if (dist < hitRadius) {
      scene.remove(e.mesh);
      enemies.splice(i, 1);
      hitPlayer();
      if (state !== 'playing') return;
    }
  }

  // ─── BULLETS ───────────────────────────────────────────────────────────────
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.y += b.vy * dt;
    b.life -= dt;

    if (b.life <= 0 || Math.abs(b.mesh.position.x) > ARENA_SIZE + 2 || Math.abs(b.mesh.position.y) > ARENA_SIZE + 2) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
      continue;
    }

    // Check bullet vs enemies
    let hit = false;
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const d = b.mesh.position.distanceTo(e.mesh.position);
      if (d < 0.5) {
        spawnParticles(e.mesh.position.x, e.mesh.position.y, 0xff4422, 10);
        scene.remove(e.mesh);
        enemies.splice(j, 1);
        score += 10;
        sfxKill();
        hit = true;
        break;
      }
    }
    if (hit) {
      scene.remove(b.mesh);
      bullets.splice(i, 1);
    }
  }

  // ─── PARTICLES ─────────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.vx *= 0.9;
    p.vy *= 0.9;
    p.life -= dt;
    p.mesh.material.opacity = p.life / 0.5;
    p.mesh.material.transparent = true;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // ─── TIMER ─────────────────────────────────────────────────────────────────
  roundTimer -= dt;
  const timerEl = document.getElementById('timer');
  timerEl.textContent = Math.max(0, Math.ceil(roundTimer));
  timerEl.style.color = roundTimer < 8 ? '#ff4444' : '#ffffff';

  updateHUD();

  if (roundTimer <= 0) {
    // Round complete
    score += 50 * round; // round bonus
    if (round >= TOTAL_ROUNDS) {
      endGame(true);
    } else {
      showVoteScreen();
    }
  }
}

// ─── ANIMATE ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  update(dt);

  // Player ring pulse
  const t = clock.elapsedTime;
  playerRing.material.opacity = 0.2 + Math.sin(t * 3) * 0.15;
  playerRing.rotation.z = t * 0.5;

  // Point light pulse
  pointLight.intensity = 1.0 + Math.sin(t * 2) * 0.5;

  composer.render();
}

animate();
</script>
