<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher — Outsmart the Black Box</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      user-select: none;
    }
    #canvas-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
    }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed;
      top: 16px; left: 16px;
      z-index: 10;
      pointer-events: none;
    }
    #level-display {
      font-size: 12px;
      color: #7070a0;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #hp-display {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .hp-pip {
      width: 14px; height: 14px;
      border: 1px solid #c04040;
      border-radius: 2px;
      background: #c04040;
      box-shadow: 0 0 6px #c04040;
      transition: all 0.3s;
    }
    .hp-pip.empty {
      background: transparent;
      box-shadow: none;
    }

    /* Right panel — packages */
    #right-panel {
      position: fixed;
      top: 0; right: 0;
      width: 220px;
      height: 100vh;
      background: rgba(10,10,20,0.85);
      border-left: 1px solid #1a1a2e;
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
    }
    #panel-title {
      font-size: 10px;
      letter-spacing: 3px;
      color: #404060;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .pkg-section-label {
      font-size: 9px;
      letter-spacing: 2px;
      color: #606080;
      text-transform: uppercase;
      margin: 8px 0 6px;
      border-top: 1px solid #1a1a2e;
      padding-top: 8px;
    }
    .pkg-card {
      padding: 8px;
      margin-bottom: 6px;
      border: 1px solid #1a1a2e;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 11px;
      line-height: 1.5;
    }
    .pkg-card:hover { border-color: #3a3a6a; background: rgba(60,60,120,0.15); }
    .pkg-card.selected { border-color: #4040c0; background: rgba(40,40,180,0.2); box-shadow: 0 0 8px rgba(60,60,220,0.3); }
    .pkg-card.probe-card { border-color: #1a2a1a; }
    .pkg-card.probe-card:hover { border-color: #2a4a2a; background: rgba(40,100,40,0.1); }
    .pkg-card.probe-card.selected { border-color: #30c030; background: rgba(20,100,20,0.2); box-shadow: 0 0 8px rgba(40,200,40,0.3); }
    .pkg-card.contraband-card { border-color: #2a1a1a; }
    .pkg-card.contraband-card:hover { border-color: #5a2a2a; background: rgba(120,40,40,0.1); }
    .pkg-card.contraband-card.selected { border-color: #e04040; background: rgba(150,20,20,0.2); box-shadow: 0 0 8px rgba(220,40,40,0.3); }
    .pkg-card.used { opacity: 0.35; pointer-events: none; }
    .pkg-prop { display: inline-block; padding: 1px 5px; border-radius: 2px; margin-right: 3px; font-size: 10px; font-weight: bold; }
    .prop-color { }
    .prop-size { color: #aaa; border: 1px solid #333; }
    .prop-mat { color: #aaa; border: 1px solid #333; }

    /* Send button */
    #send-btn {
      margin-top: auto;
      padding: 12px;
      background: #1a1a3a;
      border: 1px solid #3a3a8a;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: #8080d0;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    #send-btn:hover:not(:disabled) {
      background: #2a2a5a;
      border-color: #6060c0;
      color: #c0c0ff;
      box-shadow: 0 0 10px rgba(80,80,200,0.3);
    }
    #send-btn:disabled { opacity: 0.3; cursor: default; }

    /* Scan result flash */
    #scan-flash {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      text-align: center;
    }
    #scan-flash.pass { color: #40e040; text-shadow: 0 0 20px #40e040, 0 0 40px #40e040; }
    #scan-flash.flag { color: #e04040; text-shadow: 0 0 20px #e04040, 0 0 40px #e04040; }

    /* Overlay screens */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(5,5,15,0.92);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #overlay h1 {
      font-size: 36px;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    #overlay .subtitle {
      font-size: 13px;
      letter-spacing: 2px;
      color: #707090;
      margin-bottom: 32px;
      max-width: 500px;
      line-height: 1.6;
    }
    #overlay .rule-reveal {
      font-size: 14px;
      color: #a0a0e0;
      margin-bottom: 24px;
      padding: 12px 24px;
      border: 1px solid #3a3a6a;
      border-radius: 3px;
      background: rgba(30,30,80,0.4);
      letter-spacing: 1px;
    }
    .btn {
      padding: 14px 32px;
      border: 1px solid;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all 0.15s;
      background: transparent;
    }
    .btn-primary {
      color: #6060d0;
      border-color: #6060d0;
    }
    .btn-primary:hover {
      background: rgba(60,60,200,0.2);
      color: #a0a0ff;
      border-color: #a0a0ff;
      box-shadow: 0 0 16px rgba(80,80,220,0.3);
    }

    /* Log panel (bottom) */
    #log {
      position: fixed;
      bottom: 16px; left: 16px;
      width: 380px;
      max-height: 120px;
      overflow-y: auto;
      z-index: 10;
      pointer-events: none;
    }
    .log-entry {
      font-size: 10px;
      letter-spacing: 1px;
      color: #505070;
      margin-bottom: 3px;
      padding-left: 12px;
      border-left: 2px solid #202040;
    }
    .log-entry.pass { color: #3a8a3a; border-color: #3a8a3a; }
    .log-entry.flag { color: #8a3a3a; border-color: #8a3a3a; }

    /* Screen shake */
    #canvas-container.shake {
      animation: shake 0.3s ease-out;
    }
    @keyframes shake {
      0%,100% { transform: translate(0,0); }
      20% { transform: translate(-6px, 3px); }
      40% { transform: translate(6px, -3px); }
      60% { transform: translate(-4px, 2px); }
      80% { transform: translate(4px, -2px); }
    }

    /* Scan progress bar */
    #scan-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: #4040c0;
      width: 0%;
      z-index: 15;
      box-shadow: 0 0 8px #4040c0;
      transition: none;
    }

    /* Invincibility flash */
    #iframe-indicator {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
      border: 3px solid transparent;
      transition: border-color 0.1s;
    }
    #iframe-indicator.active {
      border-color: rgba(220, 60, 60, 0.4);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <!-- HUD -->
  <div id="hud">
    <div id="level-display">LEVEL <span id="level-num">1</span> / 5</div>
    <div id="hp-display">
      <div class="hp-pip" id="hp1"></div>
      <div class="hp-pip" id="hp2"></div>
      <div class="hp-pip" id="hp3"></div>
    </div>
  </div>

  <!-- Right panel -->
  <div id="right-panel">
    <div id="panel-title">📦 Package Queue</div>
    <div class="pkg-section-label">🔬 Probe Items</div>
    <div id="probe-list"></div>
    <div class="pkg-section-label">⚠️ Contraband</div>
    <div id="contraband-list"></div>
    <button id="send-btn" disabled>► SEND PACKAGE</button>
  </div>

  <!-- Scan flash -->
  <div id="scan-flash"></div>
  <div id="scan-bar"></div>
  <div id="iframe-indicator"></div>

  <!-- Log -->
  <div id="log"></div>

  <!-- Overlay -->
  <div id="overlay">
    <h1 style="color:#6060d0;">CIPHER</h1>
    <div class="subtitle">
      The AI scanner has a hidden ruleset.<br>
      Probe it. Learn it. Exploit it.<br><br>
      <span style="color:#505070">Every package has 3 properties: COLOR · SIZE · MATERIAL<br>
      Probe items are safe — only flagged CONTRABAND costs HP.</span>
    </div>
    <button class="btn btn-primary" id="start-btn">► BEGIN OPERATION</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
