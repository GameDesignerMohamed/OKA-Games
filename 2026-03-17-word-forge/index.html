<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Forge</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0a00; overflow: hidden; font-family: 'Courier New', monospace; color: #ffb347; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 16px 20px; pointer-events: none; z-index: 10;
  }
  #lives-display { display: flex; gap: 8px; }
  .life-pip {
    width: 14px; height: 14px; border-radius: 50%;
    background: #ff6b35; border: 2px solid #ff9a5c;
    box-shadow: 0 0 8px #ff6b35;
    transition: all 0.3s;
  }
  .life-pip.empty { background: #333; border-color: #555; box-shadow: none; }
  #wave-display { text-align: center; }
  #wave-label { font-size: 11px; letter-spacing: 3px; color: #cc7722; }
  #wave-num { font-size: 22px; font-weight: bold; color: #ffb347; text-shadow: 0 0 12px #ff8800; }
  #score-display { text-align: right; }
  #score-label { font-size: 11px; letter-spacing: 3px; color: #cc7722; }
  #score-num { font-size: 22px; font-weight: bold; color: #ffb347; text-shadow: 0 0 12px #ff8800; }

  /* Forge Panel */
  #forge-panel {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 480px; background: rgba(30, 10, 0, 0.92);
    border: 1px solid #cc5500; border-bottom: none;
    border-radius: 12px 12px 0 0;
    padding: 16px 20px 20px;
    z-index: 20;
    box-shadow: 0 -4px 30px rgba(255, 100, 0, 0.25);
  }
  #forge-title {
    font-size: 10px; letter-spacing: 4px; color: #aa4400;
    text-align: center; margin-bottom: 12px; text-transform: uppercase;
  }
  #forge-input-row {
    display: flex; gap: 10px; align-items: center; margin-bottom: 12px;
  }
  #word-input {
    flex: 1; background: #2a0d00; border: 2px solid #885522;
    border-radius: 6px; padding: 10px 14px; font-size: 22px;
    font-family: 'Courier New', monospace; color: #ffcc66; text-transform: uppercase;
    letter-spacing: 6px; outline: none; caret-color: #ff8800;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #word-input:focus { border-color: #ff8800; box-shadow: 0 0 15px rgba(255, 136, 0, 0.3); }
  #word-input:disabled { opacity: 0.5; cursor: not-allowed; }
  #forge-btn {
    background: linear-gradient(135deg, #cc4400, #ff8800);
    border: none; border-radius: 6px; padding: 10px 18px;
    font-family: 'Courier New', monospace; font-size: 13px; font-weight: bold;
    color: #fff; letter-spacing: 2px; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
    box-shadow: 0 2px 12px rgba(255, 100, 0, 0.4);
  }
  #forge-btn:hover:not(:disabled) { box-shadow: 0 2px 20px rgba(255, 100, 0, 0.7); transform: translateY(-1px); }
  #forge-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Trace Panel */
  #trace-panel {
    min-height: 52px; background: #1a0800;
    border-radius: 6px; padding: 8px 12px;
    border: 1px solid #442200;
  }
  #trace-steps { display: flex; flex-direction: column; gap: 4px; }
  .trace-step {
    display: flex; gap: 10px; align-items: center;
    font-size: 12px; opacity: 0;
    transition: opacity 0.2s;
  }
  .trace-step.visible { opacity: 1; }
  .trace-key { color: #ff9900; min-width: 80px; font-weight: bold; }
  .trace-arrow { color: #664422; }
  .trace-val { color: #ffcc88; }
  .trace-result {
    display: flex; gap: 10px; align-items: center;
    font-size: 13px; color: #ffdd44; font-weight: bold;
    border-top: 1px solid #442200; margin-top: 6px; padding-top: 6px;
    opacity: 0; transition: opacity 0.3s;
  }
  .trace-result.visible { opacity: 1; }
  #weapon-name-display { color: #ff8800; font-size: 14px; font-weight: bold; }
  #cooldown-bar-wrap {
    height: 3px; background: #332200; border-radius: 2px; margin-top: 8px; overflow: hidden;
  }
  #cooldown-bar { height: 100%; background: #ff8800; width: 0%; transition: width 0.05s linear; }

  /* Screen overlay */
  #screen-overlay {
    position: fixed; inset: 0; background: rgba(15, 5, 0, 0.88);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 100; gap: 16px;
  }
  #screen-overlay h1 {
    font-size: 56px; letter-spacing: 8px;
    color: #ff8800; text-shadow: 0 0 30px #ff5500, 0 0 60px #ff2200;
  }
  #screen-overlay .sub { font-size: 14px; letter-spacing: 4px; color: #aa5522; text-transform: uppercase; }
  #screen-overlay .hint { font-size: 13px; color: #886644; margin-top: 8px; }
  #start-btn, #restart-btn {
    margin-top: 16px; background: linear-gradient(135deg, #cc4400, #ff8800);
    border: none; border-radius: 8px; padding: 14px 40px;
    font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold;
    color: #fff; letter-spacing: 4px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(255, 100, 0, 0.5);
    text-transform: uppercase; transition: all 0.2s;
  }
  #start-btn:hover, #restart-btn:hover {
    box-shadow: 0 4px 35px rgba(255, 100, 0, 0.8);
    transform: translateY(-2px);
  }
  #result-label { font-size: 28px; letter-spacing: 6px; }
  #best-display { font-size: 12px; color: #886644; letter-spacing: 2px; }

  /* Wave announce */
  #wave-announce {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 40px; letter-spacing: 8px; color: #ffaa33;
    text-shadow: 0 0 20px #ff6600; pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.3s;
    text-transform: uppercase;
  }

  /* Weapon glow */
  #weapon-glow {
    position: fixed; bottom: 170px; left: 50%; transform: translateX(-50%);
    width: 8px; height: 8px; border-radius: 50%;
    background: #ff8800; box-shadow: 0 0 20px 8px #ff440066;
    pointer-events: none; z-index: 5; opacity: 0;
    transition: opacity 0.3s, background 0.3s, box-shadow 0.3s;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud">
  <div id="lives-display">
    <div class="life-pip" id="life-0"></div>
    <div class="life-pip" id="life-1"></div>
    <div class="life-pip" id="life-2"></div>
  </div>
  <div id="wave-display">
    <div id="wave-label">WAVE</div>
    <div id="wave-num">—</div>
  </div>
  <div id="score-display">
    <div id="score-label">KILLS</div>
    <div id="score-num">0</div>
  </div>
</div>

<!-- Wave announce -->
<div id="wave-announce"></div>

<!-- Weapon glow indicator -->
<div id="weapon-glow"></div>

<!-- Forge Panel -->
<div id="forge-panel">
  <div id="forge-title">⚒ Word Forge</div>
  <div id="forge-input-row">
    <input type="text" id="word-input" maxlength="10" placeholder="TYPE A WORD" autocomplete="off" spellcheck="false" />
    <button id="forge-btn">FORGE</button>
  </div>
  <div id="trace-panel">
    <div id="trace-steps"></div>
    <div id="cooldown-bar-wrap"><div id="cooldown-bar"></div></div>
  </div>
  <div id="weapon-name-display"></div>
</div>

<!-- Screen Overlay -->
<div id="screen-overlay">
  <h1>WORD FORGE</h1>
  <div class="sub">Type a word. Shape your weapon.</div>
  <div class="hint">B/F/V → fire &nbsp;|&nbsp; S/Z → poison &nbsp;|&nbsp; T/K → pierce &nbsp;|&nbsp; L/W → wave &nbsp;|&nbsp; M/N → magnet</div>
  <div class="hint">length → shots &nbsp;|&nbsp; vowels → speed &nbsp;|&nbsp; -SH/-NG/-ST/-ER → special</div>
  <div id="best-display"></div>
  <button id="start-btn">BEGIN FORGING</button>
</div>

<script type="module" src="game.js"></script>
</body>
</html>
